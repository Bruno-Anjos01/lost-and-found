{% extends "base.html" %}
{% block title %}Adicionar Item — Achados & Perdidos{% endblock %}

{% block body %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">

  <div class="col-md-7 col-lg-6">
    <div class="card shadow-lg border-0" style="border-radius: 15px; background-color: transparent;">
      
      <div class="card-body p-4 text-white">
        <h4 class="mb-4 text-center">Adicionar novo item</h4>

        <form method="POST" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="form-label">Título</label>
            <input name="titulo" class="form-control" required
                   style="background-color: #e9ecef;">
          </div>

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea name="descricao" rows="4" class="form-control" required
                      style="background-color: #e9ecef;"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Local</label>
            <input name="local" class="form-control"
                   style="background-color: #e9ecef;">
          </div>

          <div class="mb-3">
            <label class="form-label">Data (ex: 20/11/2025)</label>
            <input name="data_item" class="form-control"
                   style="background-color: #e9ecef;">
          </div>

          <div class="mb-3">
            <label class="form-label">Imagem</label>
            <input type="file" name="imagem" accept="image/*"
                   class="form-control" required
                   style="background-color: #e9ecef;">
          </div>

          <div class="d-grid">
            <button class="btn btn-success">Enviar Item</button>
          </div>

        </form>

      </div>
    </div>
  </div>

</div>
{% endblock %}
